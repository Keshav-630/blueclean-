# Render Blueprint: https://render.com/docs/blueprint-spec
#
# rootDir is relative to the Git repo root. This app keeps package.json at
# the repo root, so Render should build from ".".
services:
  - type: web
    name: blueclean
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci --omit=dev --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
