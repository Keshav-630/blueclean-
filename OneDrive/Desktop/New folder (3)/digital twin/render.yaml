# Render Blueprint: https://render.com/docs/blueprint-spec
# If build fails with "cannot find package.json", set Root Directory in the dashboard
# to the folder that contains package.json (e.g. monorepo subfolder).
services:
  - type: web
    name: blueclean
    runtime: node
    plan: free
    buildCommand: npm install --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
