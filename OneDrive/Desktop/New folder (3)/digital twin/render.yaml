# Render Blueprint: https://render.com/docs/blueprint-spec
#
# rootDir is relative to the Git repo root. This repository currently stores
# the app under OneDrive/Desktop/New folder (3)/digital twin.
services:
  - type: web
    name: blueclean
    runtime: node
    plan: free
    rootDir: "OneDrive/Desktop/New folder (3)/digital twin"
    buildCommand: npm ci --omit=dev --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
