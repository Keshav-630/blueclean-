# Render Blueprint: https://render.com/docs/blueprint-spec
#
# rootDir = folder that contains package.json (relative to Git repo root).
# This repo nests the app under OneDrive/.../digital twin/ — match GitHub exactly.
# Later you can move files to repo root and set rootDir to . for a cleaner layout.
services:
  - type: web
    name: blueclean
    runtime: node
    plan: free
    rootDir: "OneDrive/Desktop/New folder (3)/digital twin"
    buildCommand: npm install --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
