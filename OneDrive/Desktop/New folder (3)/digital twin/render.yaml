# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Build and start commands cd into the app folder because this Git repo root
# is C:/Users/kesha while the Node app is nested below OneDrive/Desktop.
services:
  - type: web
    name: blueclean
    runtime: node
    plan: free
    rootDir: .
    buildCommand: cd "OneDrive/Desktop/New folder (3)/digital twin" && npm ci --omit=dev --no-audit --no-fund
    startCommand: cd "OneDrive/Desktop/New folder (3)/digital twin" && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
